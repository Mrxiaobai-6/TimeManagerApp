name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Clear npm cache
      run: npm cache clean --force

    - name: Install dependencies
      run: npm install --legacy-peer-deps

    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Accept Android licenses
      run: |
        yes | sdkmanager --licenses
        yes | sdkmanager --update

    - name: Install Android build tools
      run: |
        sdkmanager "platforms;android-33" "build-tools;33.0.0"
        sdkmanager "platforms;android-30" "build-tools;30.0.3"

    - name: Check gradlew exists
      run: |
        if [ -f "android/gradlew" ]; then
          echo "gradlew found"
          cd android
          chmod +x gradlew
        else
          echo "gradlew not found, using gradle wrapper"
        fi

    - name: Debug build environment
      run: |
        echo "=== Debug Info ==="
        cd android
        ls -la
        echo "Gradle version:"
        if [ -f "gradlew" ]; then
          ./gradlew --version
        else
          gradle --version
        fi
        echo "Java version:"
        java -version

    - name: Clean build
      run: |
        cd android
        if [ -f "gradlew" ]; then
          ./gradlew clean --stacktrace
        else
          gradle clean --stacktrace
        fi

    - name: Build APK
      env:
        GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m -XX:MaxPermSize=512m"
      run: |
        cd android
        if [ -f "gradlew" ]; then
          ./gradlew assembleDebug --stacktrace --no-daemon --refresh-dependencies -x test
        else
          gradle assembleDebug --stacktrace --no-daemon -x test
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
