name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Clear npm cache
      run: npm cache clean --force

    - name: Install dependencies
      run: npm install --legacy-peer-deps

    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Accept Android licenses
      run: |
        yes | sdkmanager --licenses
        yes | sdkmanager --update

    - name: Install Android build tools
      run: |
        sdkmanager "platforms;android-33" "build-tools;33.0.0"
        sdkmanager "platforms;android-30" "build-tools;30.0.3"

    - name: Check project structure
      run: |
        echo "=== Project Structure ==="
        ls -la
        echo "=== Find build.gradle ==="
        find . -name "build.gradle" 2>/dev/null || echo "No build.gradle found"
        echo "=== Find gradlew ==="
        find . -name "gradlew" 2>/dev/null || echo "No gradlew found"

    - name: Setup Android project
      run: |
        if [ -d "android" ]; then
          echo "Android directory exists"
          cd android
        elif [ -f "build.gradle" ]; then
          echo "build.gradle in root, using root as android project"
        else
          echo "No android project found, creating one"
          # 创建基本的android项目结构
          mkdir -p android/app/src/main
          echo 'apply plugin: "com.android.application"' > android/app/build.gradle
        fi

    - name: Make gradlew executable
      run: |
        if [ -f "gradlew" ]; then
          chmod +x gradlew
        elif [ -f "android/gradlew" ]; then
          chmod +x android/gradlew
        else
          echo "No gradlew to make executable"
        fi

    - name: Clean build
      run: |
        if [ -f "gradlew" ]; then
          ./gradlew clean --stacktrace || echo "Clean failed"
        elif [ -f "android/gradlew" ]; then
          cd android && ./gradlew clean --stacktrace || echo "Clean failed"
        else
          echo "No gradlew found for clean"
        fi

    - name: Build APK
      env:
        GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m -XX:MaxPermSize=512m"
      run: |
        if [ -f "gradlew" ]; then
          ./gradlew assembleDebug --stacktrace --no-daemon --refresh-dependencies -x test || echo "Build failed"
        elif [ -f "android/gradlew" ]; then
          cd android && ./gradlew assembleDebug --stacktrace --no-daemon --refresh-dependencies -x test || echo "Build failed"
        else
          echo "No gradlew found for build"
          # 尝试使用npx expo build
          npx expo build:android --no-wait --profile preview || echo "Expo build failed"
        fi

    - name: Find APK
      run: |
        echo "=== Find APK ==="
        find . -name "*.apk" 2>/dev/null || echo "No APK found"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: |
          **/*.apk
          android/app/build/outputs/apk/debug/app-debug.apk
